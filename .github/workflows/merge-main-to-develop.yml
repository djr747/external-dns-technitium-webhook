name: Merge main to develop

on:
  push:
    branches:
      - main

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if main is ahead of develop
        id: check-ahead
        run: |
          # fail fast and enable pipefail to catch errors
          set -euo pipefail

          # Fetch the remote branches (full history)
          git fetch origin main develop

          # Make sure develop exists remotely
          if ! git show-ref --verify --quiet refs/remotes/origin/develop; then
            echo "no develop branch exists on remote, nothing to do"
            echo "ahead=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Compare remote refs directly to avoid ambiguous local names
          if git rev-list --count origin/develop..origin/main > 0; then
            echo "main is ahead of develop"
            echo "ahead=true" >> $GITHUB_OUTPUT
          else
            echo "develop is up-to-date or ahead"
            echo "ahead=false" >> $GITHUB_OUTPUT
          fi

      - name: Merge main into develop (only if ahead)
        if: steps.check-ahead.outputs.ahead == 'true'
        run: |
          git checkout develop
          git merge main --no-edit --ff-only  # Use fast-forward only to avoid merge commits
          git push origin develop